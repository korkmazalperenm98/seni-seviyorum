<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nisa'm İçin ❤️</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Dancing Script', cursive; 
            background: linear-gradient(135deg, #ffcc33 0%, #cc99ff 100%);
            overflow: hidden;
            touch-action: none;
            padding: 20px;
            position: relative;
        }

        /* Çiçeklerin dairesel dönme animasyonu */
        @keyframes rotateFlower {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .flower {
            position: absolute;
            pointer-events: none;
            opacity: 0.4;
            z-index: 1;
            animation: rotateFlower 4s linear infinite;
            user-select: none;
        }

        #mesaj { 
            font-weight: bold; 
            text-align: center; 
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 50px;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1.3;
            max-width: 90%;
            font-size: 36px;
        }

        .btn-container {
            display: flex;
            gap: 25px;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        #evetBtn { 
            background-color: rgba(255, 255, 255, 0.95); 
            color: #d63384; border: none; 
            padding: 18px 35px; border-radius: 50px; 
            cursor: pointer; 
            font-family: 'Dancing Script', cursive;
            font-size: 22px; 
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            text-align: center;
        }

        #hayirBtn { 
            background-color: rgba(0, 0, 0, 0.15); 
            color: rgba(255,255,255,0.9); border: none; 
            padding: 10px 25px; border-radius: 50px; 
            cursor: pointer; 
            font-family: 'Dancing Script', cursive;
            font-size: 18px;
            position: relative;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
        }

        .final-glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            padding: 40px 25px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body id="body">

    <div id="mesaj">Seni çok seviyorum Nisa'm ♥</div>

    <div class="btn-container" id="container">
        <button id="evetBtn" onclick="evetTikla()">Ben de seni çok seviyorum Alperen'im ♥</button>
        <button id="hayirBtn" onmouseover="kac()" onclick="kac()">Hayır</button>
    </div>

    <script>
        // Sayfa yüklendiğinde 100 tane rastgele pembe papatya oluştur
        window.onload = function() {
            const flowerCount = 100;
            const body = document.getElementById('body');
            const flowers = ['🌸', '💮']; // Pembe papatyamsı çiçekler

            for (let i = 0; i < flowerCount; i++) {
                let f = document.createElement('div');
                f.className = 'flower';
                f.innerText = flowers[Math.floor(Math.random() * flowers.length)];
                
                // Rastgele konumlar
                f.style.left = Math.random() * 100 + 'vw';
                f.style.top = Math.random() * 100 + 'vh';
                
                // Rastgele boyutlar (minik)
                f.style.fontSize = (Math.random() * 15 + 10) + 'px';
                
                // Rastgele dönüş hızı (biraz varyasyon iyidir)
                f.style.animationDuration = (Math.random() * 3 + 2) + 's';
                
                body.appendChild(f);
            }
        };

        let tiklamaSayisi = 0;
